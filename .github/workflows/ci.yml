name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Lint & type-check (no database needed – runs on the host with uv)
  # -------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run linter and type checker
        run: make check

  # -------------------------------------------------------------------
  # Migration check (needs PostgreSQL service container)
  # -------------------------------------------------------------------
  migrations:
    name: Check migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: wsde_test
          POSTGRES_USER: wsde
          POSTGRES_PASSWORD: wsde
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DB_NAME: wsde_test
      DB_USER: wsde
      DB_PASSWORD: wsde
      DB_HOST: localhost
      DB_PORT: 5432
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check for missing migrations
        run: make check-migrations

  # -------------------------------------------------------------------
  # Unit test suite (needs PostgreSQL service container)
  # E2E tests are a separate job run via make e2e (added when Playwright
  # infra is wired up).
  # -------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: wsde_test
          POSTGRES_USER: wsde
          POSTGRES_PASSWORD: wsde
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DB_NAME: wsde_test
      DB_USER: wsde
      DB_PASSWORD: wsde
      DB_HOST: localhost
      DB_PORT: 5432
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        # Exit code 5 means "no tests collected" — acceptable until the first
        # real test is written. Any other non-zero exit is a genuine failure.
        run: uv run pytest src/ -v || [ $? -eq 5 ]
