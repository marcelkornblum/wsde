runtime: python313
service: default
entrypoint: gunicorn -b :$PORT core.wsgi:application

env_variables:
  DJANGO_SETTINGS_MODULE: core.settings.production
  CLOUD_SQL_CONNECTION_NAME: wsde-marcelkornblum:europe-west2:wsde-db
  GCS_BUCKET_NAME: wsde-static

beta_settings:
  cloud_sql_instances: wsde-marcelkornblum:europe-west2:wsde-db

# GAE Standard automatic scaling
# Manual deploy approval is enforced via the "production" GitHub environment gate —
# see GitHub → Settings → Environments → production → Required reviewers.
automatic_scaling:
  max_instances: 2         # explicit value required since March 2025; default was changed to 20

handlers:
  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301
