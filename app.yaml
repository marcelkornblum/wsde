runtime: python313
service: default
entrypoint: gunicorn -b :$PORT core.wsgi:application

env_variables:
  DJANGO_SETTINGS_MODULE: core.settings.production

beta_settings:
  cloud_sql_instances: wsde-marcelkornblum:europe-west2:wsde-db

# GAE Standard automatic scaling defaults
# automatic_scaling:
#   min_idle_instances: 0    # scale to zero when idle
#   max_instances: 2         # cap for cost control

handlers:
  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301
